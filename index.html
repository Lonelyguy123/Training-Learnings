<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
           box-sizing: border-box;
        }
        html{
            font-size: 16px;
        }
        header{
            width: 100%;
            background-color:darkgrey
        }
        nav{
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .menu-items{
            display: flex;
            align-items: center;
            justify-content: end;

        }
        .menu-items button{
                margin-left: 10px;
                background-color: green;
                padding: 50px;
                list-style: none;
        }

        main{
            display: flex;
        }
        main div{
            width: 80%;
            background-color: darkcyan;
        }
        aside{
            background-color:aquamarine;
            width:20%;

        }
        aside{
            height: 100vh;
        }
    </style>
</head>

<body >
    <header>
        <nav>
            <div class="logo">
                <img src="" alt="logo" >
            </div>
            <div class="menu-items">


                    <button>HOME</button>
                    <button>Lorem, ipsum.</button>
                    <button>Lorem.</button>

            </div>
        </nav>
    </header>
    <main>
        <div></div><aside style="background-color:purple;">aside</aside></main>

    <footer>footer</footer>

</body>

</html>
