<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OAuth2 Auth Demo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 2.5rem;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.5);
    }

    .logo {
      text-align: center;
      margin-bottom: 2rem;
    }
    .logo h1 { font-size: 1.6rem; font-weight: 700; color: #f8fafc; }
    .logo p  { font-size: 0.85rem; color: #94a3b8; margin-top: 0.25rem; }

    .tabs {
      display: flex;
      gap: 0.5rem;
      background: #0f172a;
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 1.75rem;
    }
    .tab {
      flex: 1;
      padding: 0.55rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 600;
      background: transparent;
      color: #64748b;
      transition: all .2s;
    }
    .tab.active { background: #6366f1; color: #fff; }

    .form-group { margin-bottom: 1rem; }
    label { display: block; font-size: 0.8rem; font-weight: 600;
            color: #94a3b8; margin-bottom: 0.4rem; text-transform: uppercase; letter-spacing: .05em; }
    input {
      width: 100%;
      padding: 0.75rem 1rem;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #f1f5f9;
      font-size: 0.95rem;
      outline: none;
      transition: border-color .2s;
    }
    input:focus { border-color: #6366f1; }

    .btn {
      width: 100%;
      padding: 0.85rem;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: all .2s;
      margin-top: 0.5rem;
    }
    .btn-primary { background: #6366f1; color: #fff; }
    .btn-primary:hover { background: #4f46e5; }
    .btn-danger  { background: #ef4444; color: #fff; margin-top: 0.75rem; }
    .btn-danger:hover { background: #dc2626; }

    .alert {
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.875rem;
      margin-bottom: 1rem;
      display: none;
    }
    .alert.show { display: block; }
    .alert-error   { background: #450a0a; color: #fca5a5; border: 1px solid #7f1d1d; }
    .alert-success { background: #052e16; color: #86efac; border: 1px solid #14532d; }

    .panel { display: none; }
    .panel.active { display: block; }

    /* Dashboard panel */
    .dashboard-info {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 1.25rem;
      margin-bottom: 1rem;
    }
    .info-row { display: flex; justify-content: space-between; padding: 0.4rem 0;
                font-size: 0.9rem; border-bottom: 1px solid #1e293b; }
    .info-row:last-child { border-bottom: none; }
    .info-label { color: #64748b; }
    .info-value { color: #a5b4fc; font-weight: 600; }

    .badge {
      display: inline-block;
      font-size: 0.7rem;
      padding: 2px 8px;
      border-radius: 99px;
      background: #14532d;
      color: #86efac;
      font-weight: 700;
      margin-left: 0.5rem;
      vertical-align: middle;
    }

    .token-box {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 0.75rem;
      font-family: monospace;
      font-size: 0.72rem;
      color: #94a3b8;
      word-break: break-all;
      margin-top: 1rem;
    }
    .token-box span { color: #64748b; display: block; margin-bottom: 0.25rem; font-size: 0.7rem; text-transform: uppercase; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <h1>🔐 OAuth2 Demo</h1>
    <p>FastAPI · SQLite · JWT</p>
  </div>

  <!-- Tabs -->
  <div class="tabs" id="tabs">
    <button class="tab active" onclick="switchTab('login')">Login</button>
    <button class="tab"        onclick="switchTab('register')">Register</button>
  </div>

  <!-- Alert -->
  <div class="alert" id="alert"></div>

  <!-- Login Panel -->
  <div class="panel active" id="panel-login">
    <div class="form-group">
      <label>Username</label>
      <input id="login-username" type="text" placeholder="your_username" autocomplete="username"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input id="login-password" type="password" placeholder="••••••••" autocomplete="current-password"/>
    </div>
    <button class="btn btn-primary" onclick="login()">Sign In</button>
  </div>

  <!-- Register Panel -->
  <div class="panel" id="panel-register">
    <div class="form-group">
      <label>Username</label>
      <input id="reg-username" type="text" placeholder="choose_a_username"/>
    </div>
    <div class="form-group">
      <label>Email</label>
      <input id="reg-email" type="email" placeholder="you@example.com"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input id="reg-password" type="password" placeholder="min 8 characters"/>
    </div>
    <button class="btn btn-primary" onclick="register()">Create Account</button>
  </div>

  <!-- Dashboard Panel -->
  <div class="panel" id="panel-dashboard">
    <div class="dashboard-info">
      <div class="info-row">
        <span class="info-label">Username</span>
        <span class="info-value" id="d-username">—</span>
      </div>
      <div class="info-row">
        <span class="info-label">Email</span>
        <span class="info-value" id="d-email">—</span>
      </div>
      <div class="info-row">
        <span class="info-label">Status</span>
        <span class="info-value">Active <span class="badge">✓</span></span>
      </div>
      <div class="info-row">
        <span class="info-label">Member since</span>
        <span class="info-value" id="d-since">—</span>
      </div>
    </div>
    <div class="token-box">
      <span>Access Token (JWT)</span>
      <span id="d-token">—</span>
    </div>
    <button class="btn btn-danger" onclick="logout()">Logout</button>
  </div>
</div>

<script>
  let accessToken  = localStorage.getItem('access_token')  || '';
  let refreshToken = localStorage.getItem('refresh_token') || '';

  // Auto-restore session on page load
  if (accessToken) fetchProfile();

  // ── UI helpers ──────────────────────────────────────────────────────────────
  function showAlert(msg, type = 'error') {
    const el = document.getElementById('alert');
    el.textContent = msg;
    el.className = `alert show alert-${type}`;
    setTimeout(() => el.classList.remove('show'), 4000);
  }

  function showPanel(name) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById(`panel-${name}`).classList.add('active');

    const tabs = document.getElementById('tabs');
    tabs.style.display = name === 'dashboard' ? 'none' : 'flex';

    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('active', (name === 'login' && i === 0) || (name === 'register' && i === 1));
    });
  }

  function switchTab(tab) {
    document.getElementById('alert').classList.remove('show');
    showPanel(tab);
  }

  // ── API calls ───────────────────────────────────────────────────────────────
  async function apiFetch(url, options = {}) {
    const res  = await fetch(url, options);
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Request failed');
    return data;
  }

  async function register() {
    const username = document.getElementById('reg-username').value.trim();
    const email    = document.getElementById('reg-email').value.trim();
    const password = document.getElementById('reg-password').value;
    try {
      await apiFetch('/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, email, password }),
      });
      showAlert('Account created! Please log in.', 'success');
      switchTab('login');
    } catch (e) { showAlert(e.message); }
  }

  async function login() {
    const username = document.getElementById('login-username').value.trim();
    const password = document.getElementById('login-password').value;

    // OAuth2 Password Flow requires form-encoded body
    const body = new URLSearchParams({ username, password });
    try {
      const data = await apiFetch('/auth/token', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body,
      });
      accessToken  = data.access_token;
      refreshToken = data.refresh_token;
      localStorage.setItem('access_token',  accessToken);
      localStorage.setItem('refresh_token', refreshToken);
      await fetchProfile();
    } catch (e) { showAlert(e.message); }
  }

  async function fetchProfile() {
    try {
      const user = await apiFetch('/users/me', {
        headers: { Authorization: `Bearer ${accessToken}` }
      });
      document.getElementById('d-username').textContent = user.username;
      document.getElementById('d-email').textContent    = user.email;
      document.getElementById('d-since').textContent   = new Date(user.created_at).toLocaleDateString();
      document.getElementById('d-token').textContent   = accessToken;
      showPanel('dashboard');
    } catch {
      // Token might be expired — try refresh
      await tryRefresh();
    }
  }

  async function tryRefresh() {
    if (!refreshToken) return;
    try {
      const data = await apiFetch('/auth/refresh', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ refresh_token: refreshToken }),
      });
      accessToken  = data.access_token;
      refreshToken = data.refresh_token;
      localStorage.setItem('access_token',  accessToken);
      localStorage.setItem('refresh_token', refreshToken);
      await fetchProfile();
    } catch { clearSession(); }
  }

  async function logout() {
    try {
      await apiFetch('/auth/logout', {
        method: 'POST',
        headers: { Authorization: `Bearer ${accessToken}` }
      });
    } catch {}
    clearSession();
    showAlert('You have been logged out.', 'success');
  }

  function clearSession() {
    accessToken = refreshToken = '';
    localStorage.removeItem('access_token');
    localStorage.removeItem('refresh_token');
    showPanel('login');
  }
</script>
</body>
</html>
